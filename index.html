<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1220">
<meta name="format-detection" content="telephone=no">
<title>故障码 &amp; 温度转换</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0b1220; --card:#131c2e; --card2:#1b2740; --line:#243049;
    --text:#e7ecf5; --muted:#8b97ad;
    --brand:#3b82f6; --brand2:#60a5fa; --accent:#f59e0b; --danger:#ef4444;
  }
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:radial-gradient(1000px 500px at 50% -10%,#16233d 0%,var(--bg) 60%);
    color:var(--text); min-height:100%; padding:10px 10px 16px; line-height:1.4;
    -webkit-font-smoothing:antialiased;
  }
  main{max-width:560px;margin:0 auto;}

  header{text-align:center;padding:2px 0 8px;}
  header h1{font-size:18px;font-weight:700;}
  header .sub{color:var(--muted);font-size:11px;margin-top:2px;}

  .card{
    background:linear-gradient(180deg,var(--card) 0%,var(--card2) 100%);
    border:1px solid var(--line); border-radius:13px;
    box-shadow:0 6px 18px rgba(0,0,0,.3);
    padding:10px 12px; margin-bottom:8px;
  }
  .conv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .badge{
    font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;
    background:rgba(59,130,246,.15);color:var(--brand2);border:1px solid rgba(59,130,246,.3);
  }
  .badge.temp{background:rgba(245,158,11,.15);color:var(--accent);border-color:rgba(245,158,11,.3);}
  .formula{font-family:"SFMono-Regular",Consolas,monospace;font-size:11px;color:var(--muted);}

  .main-row{display:flex;align-items:center;gap:12px;}
  .input-wrap{position:relative;flex:1;min-width:0;}
  input[type=text]{
    width:100%;background:#0c1426;border:1.5px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 10px 11px 30px;font-size:18px;
    font-family:"SFMono-Regular",Consolas,"Courier New",monospace;letter-spacing:1.5px;
    outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input[type=text]:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,130,246,.18);}
  input[type=text]::placeholder{color:#4b5872;letter-spacing:1px;}
  .prefix{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;font-family:monospace;pointer-events:none;}

  .equals{color:var(--muted);font-size:15px;font-family:monospace;}
  .result{
    flex:0 0 auto;min-width:88px;text-align:right;
    font-size:34px;font-weight:800;line-height:1;
    font-family:"SFMono-Regular",Consolas,monospace;cursor:pointer;
    background:linear-gradient(180deg,#fff,var(--brand2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    padding:2px 0;
  }
  .result.empty{-webkit-text-fill-color:#33415a;background:none;}
  .result.err{-webkit-text-fill-color:var(--danger);background:none;font-size:16px;}
  .result .hint{display:block;font-size:9px;color:var(--muted);-webkit-text-fill-color:var(--muted);font-weight:400;letter-spacing:0;margin-top:2px;background:none;}

  .detail{
    margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);
    font-family:"SFMono-Regular",Consolas,monospace;font-size:11px;color:var(--muted);
    display:none;
  }
  .detail.show{display:grid;gap:3px;}
  .detail .row{display:flex;justify-content:space-between;gap:8px;}
  .detail .row b{color:var(--text);font-weight:600;word-break:break-all;text-align:right;}

  .qr-btn{
    width:100%;background:linear-gradient(180deg,var(--brand),#2563eb);color:#fff;border:none;
    border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:2px;
    box-shadow:0 6px 16px rgba(37,99,235,.3);
  }
  .qr-btn:active{transform:translateY(1px);}
  .qr-area{text-align:center;display:none;margin-top:8px;}
  .qr-area img{width:180px;height:180px;background:#fff;padding:8px;border-radius:10px;border:1px solid var(--line);}
  .qr-area .tip{font-size:11px;color:var(--muted);margin-top:6px;}
</style>
</head>
<body>
<main>
  <header>
    <h1>故障码 &amp; 温度转换</h1>
    <div class="sub">输入十六进制，自动换算 · 点结果看明细</div>
  </header>

  <!-- 故障码 -->
  <section class="card">
    <div class="conv-head">
      <span class="badge">故障码号</span>
      <span class="formula">value &amp; 0x3F</span>
    </div>
    <div class="main-row">
      <div class="input-wrap"><span class="prefix">0x</span>
        <input id="hexFault" type="text" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="9E" maxlength="8">
      </div>
      <div id="resFault" class="result empty" title="点击查看计算明细">—</div>
    </div>
    <div id="detFault" class="detail"></div>
  </section>

  <!-- 进水温度 -->
  <section class="card">
    <div class="conv-head">
      <span class="badge temp">进水温度</span>
      <span class="formula">value − 40</span>
    </div>
    <div class="main-row">
      <div class="input-wrap"><span class="prefix">0x</span>
        <input id="hexInlet" type="text" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="46" maxlength="8">
      </div>
      <div id="resInlet" class="result empty" title="点击查看计算明细">—</div>
    </div>
    <div id="detInlet" class="detail"></div>
  </section>

  <!-- 出水温度 -->
  <section class="card">
    <div class="conv-head">
      <span class="badge temp">出水温度</span>
      <span class="formula">value − 40</span>
    </div>
    <div class="main-row">
      <div class="input-wrap"><span class="prefix">0x</span>
        <input id="hexOutlet" type="text" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="4A" maxlength="8">
      </div>
      <div id="resOutlet" class="result empty" title="点击查看计算明细">—</div>
    </div>
    <div id="detOutlet" class="detail"></div>
  </section>

  <button class="qr-btn" id="qrBtn">显示二维码（扫码打开本工具）</button>
  <div class="qr-area" id="qrArea">
    <img id="qrImg" alt="二维码">
    <div class="tip" id="qrTip"></div>
  </div>
</main>

<script>
(function(){
  "use strict";
  var $ = function(id){return document.getElementById(id);};

  function parseHex(str){
    if(!str) return null;
    var s = String(str).trim().toUpperCase().replace(/\s+/g,"");
    if(!s) return null;
    if(s.indexOf("0X")===0) s=s.slice(2);
    if(s.charAt(s.length-1)==="H") s=s.slice(0,-1);
    if(s.charAt(0)==="#") s=s.slice(1);
    if(!/^[0-9A-F]+$/.test(s)) return null;
    return parseInt(s,16);
  }
  function toHex(n){return "0x"+n.toString(16).toUpperCase();}
  function row(k,v){return '<div class="row"><span>'+k+'</span><b>'+v+'</b></div>';}

  function bind(opts){
    var input=$(opts.hex), res=$(opts.res), det=$(opts.det);
    function setEmpty(){res.className="result empty";res.textContent="—";det.innerHTML="";det.classList.remove("show");}
    function setError(m){res.className="result err";res.textContent=m;det.innerHTML="";det.classList.remove("show");}
    input.addEventListener("input",function(){
      var cleaned=input.value.toUpperCase().replace(/[^0-9A-FX]/g,"");
      if(cleaned!==input.value) input.value=cleaned;
      if(!input.value.trim()){setEmpty();return;}
      var v=parseHex(input.value);
      if(v===null){setError("格式有误");return;}
      var out=opts.calc(v);
      res.className="result";
      res.textContent=out.display;
      det.innerHTML=opts.detail(v,out.value);   // 内容更新，展开状态保持
    });
    // 点击结果切换明细
    res.addEventListener("click",function(){
      if(!det.innerHTML) return;
      det.classList.toggle("show");
    });
  }

  // 故障码：& 0x3F
  bind({
    hex:"hexFault",res:"resFault",det:"detFault",
    calc:function(v){var r=v&0x3F;return {value:r,display:String(r)};},
    detail:function(v,r){
      return row("输入 (DEC)",v+"  ("+toHex(v)+")")+row("运算","& 0x3F")+row("结果 (HEX)",toHex(r));
    }
  });
  // 进水温度：- 40
  bind({
    hex:"hexInlet",res:"resInlet",det:"detInlet",
    calc:function(v){var r=v-40;return {value:r,display:r+" ℃"};},
    detail:function(v,r){
      return row("输入 (DEC)",v+"  ("+toHex(v)+")")+row("运算","− 40")+row("结果",r+" ℃");
    }
  });
  // 出水温度：- 40
  bind({
    hex:"hexOutlet",res:"resOutlet",det:"detOutlet",
    calc:function(v){var r=v-40;return {value:r,display:r+" ℃"};},
    detail:function(v,r){
      return row("输入 (DEC)",v+"  ("+toHex(v)+")")+row("运算","− 40")+row("结果",r+" ℃");
    }
  });

  // 二维码（指向当前页面 URL）
  $("qrBtn").addEventListener("click",function(){
    var area=$("qrArea"),img=$("qrImg"),tip=$("qrTip"),url=location.href;
    if(/^https?:\/\//i.test(url)){
      img.src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=10&data="+encodeURIComponent(url);
      tip.className="tip";tip.style.color="";
      tip.textContent="微信长按上方二维码 → 识别图中二维码，即可打开本工具";
      area.style.display="block";
    }else{
      img.removeAttribute("src");
      tip.className="tip";tip.style.color="var(--accent)";
      tip.innerHTML="当前本地打开，微信扫不开。部署到公网后此按钮生成可扫二维码。";
      area.style.display="block";
    }
  });
})();
</script>
</body>
</html>
