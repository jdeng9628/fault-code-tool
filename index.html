<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1220">
<meta name="format-detection" content="telephone=no">
<title>故障码 &amp; 温度转换</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0b1220; --card:#131c2e; --card2:#1b2740; --line:#243049;
    --text:#e7ecf5; --muted:#8b97ad;
    --brand:#3b82f6; --brand2:#60a5fa; --accent:#f59e0b; --danger:#ef4444;
  }
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#16233d 0%,var(--bg) 60%);
    color:var(--text); min-height:100%; padding:16px 14px 40px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  main{max-width:560px;margin:0 auto;}
  header{text-align:center;padding:8px 0 18px;}
  header h1{font-size:21px;font-weight:700;}
  header .sub{color:var(--muted);font-size:13px;margin-top:6px;}

  .card{
    background:linear-gradient(180deg,var(--card) 0%,var(--card2) 100%);
    border:1px solid var(--line); border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    padding:16px; margin-bottom:12px;
  }
  .conv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .badge{
    font-size:14px;font-weight:700;padding:5px 12px;border-radius:20px;
    background:rgba(59,130,246,.15);color:var(--brand2);border:1px solid rgba(59,130,246,.3);
  }
  .badge.temp{background:rgba(245,158,11,.15);color:var(--accent);border-color:rgba(245,158,11,.3);}
  .formula{font-family:"SFMono-Regular",Consolas,monospace;font-size:12px;color:var(--muted);}

  .input-wrap{position:relative;}
  input[type=text]{
    width:100%;background:#0c1426;border:1.5px solid var(--line);color:var(--text);
    border-radius:12px;padding:15px 14px;font-size:21px;
    font-family:"SFMono-Regular",Consolas,"Courier New",monospace;letter-spacing:2px;text-align:center;
    outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input[type=text]:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(59,130,246,.18);}
  input[type=text]::placeholder{color:#4b5872;letter-spacing:1px;}
  .prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px;font-family:monospace;pointer-events:none;}
  .has-prefix input{padding-left:36px;text-align:left;}

  .result{
    text-align:center;margin-top:14px;
    font-size:54px;font-weight:800;line-height:1.1;
    font-family:"SFMono-Regular",Consolas,monospace;
    background:linear-gradient(180deg,#fff,var(--brand2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .result.empty{-webkit-text-fill-color:#33415a;background:none;}
  .result.err{-webkit-text-fill-color:var(--danger);background:none;font-size:20px;}

  .detail{
    margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
    font-family:"SFMono-Regular",Consolas,monospace;font-size:13px;color:var(--muted);
    display:grid;gap:4px;text-align:left;
  }
  .detail .row{display:flex;justify-content:space-between;gap:8px;}
  .detail .row b{color:var(--text);font-weight:600;word-break:break-all;text-align:right;}

  .qr-btn{
    width:100%;background:linear-gradient(180deg,var(--brand),#2563eb);color:#fff;border:none;
    border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;
    box-shadow:0 8px 20px rgba(37,99,235,.35);
  }
  .qr-btn:active{transform:translateY(1px);}
  .qr-area{text-align:center;display:none;margin-top:10px;}
  .qr-area img{width:210px;height:210px;background:#fff;padding:10px;border-radius:12px;border:1px solid var(--line);}
  .qr-area .tip{font-size:12px;color:var(--muted);margin-top:8px;}

  footer{text-align:center;color:#41506e;font-size:11px;margin-top:16px;line-height:1.7;}
</style>
</head>
<body>
<main>
  <header>
    <h1>故障码 &amp; 温度转换</h1>
    <div class="sub">输入十六进制值，自动换算结果</div>
  </header>

  <!-- 故障码 -->
  <section class="card">
    <div class="conv-head">
      <span class="badge">故障码号</span>
      <span class="formula">value &amp; 0x3F</span>
    </div>
    <div class="input-wrap has-prefix">
      <span class="prefix">0x</span>
      <input id="hexFault" type="text" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="例如 9E" maxlength="8">
    </div>
    <div id="resFault" class="result empty">—</div>
    <div id="detFault" class="detail" style="display:none;"></div>
  </section>

  <!-- 进水温度 -->
  <section class="card">
    <div class="conv-head">
      <span class="badge temp">进水温度</span>
      <span class="formula">value − 40</span>
    </div>
    <div class="input-wrap has-prefix">
      <span class="prefix">0x</span>
      <input id="hexInlet" type="text" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="例如 46" maxlength="8">
    </div>
    <div id="resInlet" class="result empty">—</div>
    <div id="detInlet" class="detail" style="display:none;"></div>
  </section>

  <!-- 出水温度 -->
  <section class="card">
    <div class="conv-head">
      <span class="badge temp">出水温度</span>
      <span class="formula">value − 40</span>
    </div>
    <div class="input-wrap has-prefix">
      <span class="prefix">0x</span>
      <input id="hexOutlet" type="text" inputmode="text" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="例如 4A" maxlength="8">
    </div>
    <div id="resOutlet" class="result empty">—</div>
    <div id="detOutlet" class="detail" style="display:none;"></div>
  </section>

  <button class="qr-btn" id="qrBtn">显示二维码（扫码打开本工具）</button>
  <div class="qr-area" id="qrArea">
    <img id="qrImg" alt="二维码">
    <div class="tip" id="qrTip"></div>
  </div>

  <footer>
    故障码 = 输入 &amp; 0x3F &nbsp;|&nbsp; 温度(℃) = 输入 − 40<br>
    示例：9E → 故障码 30 ／ 46 → 进水 30℃ ／ 1E → 出水 -10℃
  </footer>
</main>

<script>
(function(){
  "use strict";
  var $ = function(id){return document.getElementById(id);};

  function parseHex(str){
    if(!str) return null;
    var s = String(str).trim().toUpperCase().replace(/\s+/g,"");
    if(!s) return null;
    if(s.indexOf("0X")===0) s=s.slice(2);
    if(s.charAt(s.length-1)==="H") s=s.slice(0,-1);
    if(s.charAt(0)==="#") s=s.slice(1);
    if(!/^[0-9A-F]+$/.test(s)) return null;
    return parseInt(s,16);
  }
  function toHex(n){return "0x"+n.toString(16).toUpperCase();}
  function row(k,v){return '<div class="row"><span>'+k+'</span><b>'+v+'</b></div>';}

  // 通用：绑定一个转换器
  function bind(opts){
    var input=$(opts.hex), res=$(opts.res), det=$(opts.det);
    function setEmpty(){res.className="result empty";res.textContent="—";det.style.display="none";}
    function setError(m){res.className="result err";res.textContent=m;det.style.display="none";}
    input.addEventListener("input",function(){
      var cleaned=input.value.toUpperCase().replace(/[^0-9A-FX]/g,"");
      if(cleaned!==input.value) input.value=cleaned;
      if(!input.value.trim()){setEmpty();return;}
      var v=parseHex(input.value);
      if(v===null){setError("格式有误");return;}
      var out=opts.calc(v);
      res.className="result";
      res.textContent=out.display;
      det.style.display="grid";
      det.innerHTML=opts.detail(v,out.value);
    });
  }

  // 故障码：& 0x3F
  bind({
    hex:"hexFault",res:"resFault",det:"detFault",
    calc:function(v){var r=v&0x3F;return {value:r,display:String(r)};},
    detail:function(v,r){
      return row("输入 (DEC)",v+"  ("+toHex(v)+")")
           + row("运算","& 0x3F")
           + row("结果 (HEX)",toHex(r));
    }
  });
  // 进水温度：- 40
  bind({
    hex:"hexInlet",res:"resInlet",det:"detInlet",
    calc:function(v){var r=v-40;return {value:r,display:r+" ℃"};},
    detail:function(v,r){
      return row("输入 (DEC)",v+"  ("+toHex(v)+")")
           + row("运算","− 40")
           + row("结果",r+" ℃");
    }
  });
  // 出水温度：- 40
  bind({
    hex:"hexOutlet",res:"resOutlet",det:"detOutlet",
    calc:function(v){var r=v-40;return {value:r,display:r+" ℃"};},
    detail:function(v,r){
      return row("输入 (DEC)",v+"  ("+toHex(v)+")")
           + row("运算","− 40")
           + row("结果",r+" ℃");
    }
  });

  // 二维码（指向当前页面 URL，部署后即指向公网地址）
  $("qrBtn").addEventListener("click",function(){
    var area=$("qrArea"),img=$("qrImg"),tip=$("qrTip"),url=location.href;
    if(/^https?:\/\//i.test(url)){
      img.src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=10&data="+encodeURIComponent(url);
      tip.className="tip";tip.style.color="";
      tip.textContent="微信长按上方二维码 → 识别图中二维码，即可打开本工具";
      area.style.display="block";
    }else{
      img.removeAttribute("src");
      tip.className="tip";tip.style.color="var(--accent)";
      tip.innerHTML="当前本地打开，微信扫不开。部署到公网后此按钮生成可扫二维码。";
      area.style.display="block";
    }
  });
})();
</script>
</body>
</html>
